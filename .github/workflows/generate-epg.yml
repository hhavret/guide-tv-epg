name: Generate Game One XMLTV

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"

permissions:
  contents: write

jobs:
  generate-gameone:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout ton dépôt
        uses: actions/checkout@v5

      - name: Checkout iptv-org epg
        uses: actions/checkout@v5
        with:
          repository: iptv-org/epg
          path: epg

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Installer les dépendances
        working-directory: epg
        run: npm install

      - name: Chercher Game One dans iptv-org
        working-directory: epg
        shell: bash
        run: |
          echo "========================================="
          echo " Recherche des variantes de Game One"
          echo "========================================="

          echo ""
          echo ">>> GAME ONE / Game One / GameOne / game-one"
          grep -RniE "GAME ONE|Game One|GameOne|game-one|gameone" sites/ || true

          echo ""
          echo "========================================="
          echo " Recherche de GameOne.fr"
          echo "========================================="
          grep -Rni "GameOne.fr" sites/ || true

          echo ""
          echo "========================================="
          echo " Recherche du site_id #592"
          echo "========================================="
          grep -Rni "#592" sites/ || true

          echo ""
          echo "========================================="
          echo " Toutes les chaînes contenant Game"
          echo "========================================="
          find sites -name "*.channels.xml" -exec grep -Hni "Game" {} \; || true

      - name: Créer channels.xml pour Game One
        run: |
          cat > channels.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <channels>
            <channel site="canalplus.com" site_id="#592" lang="fr" xmltv_id="GameOne.fr@SD">GAME ONE</channel>
          </channels>
          EOF

      - name: Générer gameone.xml
        working-directory: epg
        run: npm run grab -- --channels=../channels.xml --output=../gameone.xml --days=7 --maxConnections=1

      - name: Sauvegarder gameone.xml
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add gameone.xml
          git commit -m "Update Game One XMLTV" || echo "Aucun changement"
          git push
